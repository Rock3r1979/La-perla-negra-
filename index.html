<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏴‍☠️ LA PERLA NEGRA - IPTV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: #000;
            border-bottom: 2px solid #D4AF37;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo h1 {
            color: #D4AF37;
            font-size: 1.5em;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: #1a1a1a;
            border: 1px solid #D4AF37;
            border-radius: 40px;
            padding: 8px 15px;
            color: #D4AF37;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
        }

        .icon-btn.active {
            background: #D4AF37;
            color: #000;
            border-color: #00ff00;
        }

        /* CONTENEDOR PRINCIPAL - 2 COLUMNAS */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 15px;
            gap: 15px;
        }

        /* COLUMNA IZQUIERDA - LISTA DE CANALES */
        .channels-column {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 300px;
        }

        .input-area {
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        .url-box {
            display: flex;
            gap: 10px;
        }

        .url-box input {
            flex: 1;
            background: #000;
            border: 1px solid #D4AF37;
            border-radius: 8px;
            padding: 12px;
            color: white;
        }

        .url-box button {
            background: #D4AF37;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            font-size: 0.8em;
            color: #666;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #333;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: #000;
            color: #666;
        }

        .tab.active {
            background: #D4AF37;
            color: #000;
            font-weight: bold;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
        }

        .channel-item:hover {
            background: #2a2a2a;
            border-color: #D4AF37;
        }

        .channel-item.blocked {
            opacity: 0.4;
            pointer-events: none;
        }

        .channel-name {
            flex: 1;
        }

        .channel-category {
            color: #D4AF37;
            font-size: 0.8em;
            margin-right: 10px;
        }

        /* COLUMNA DERECHA - REPRODUCTOR */
        .player-column {
            width: 500px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .player-header {
            padding: 15px;
            background: #000;
            border-bottom: 1px solid #333;
        }

        .player-header h3 {
            color: #D4AF37;
            font-size: 1em;
        }

        .video-wrapper {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        video {
            width: 100%;
            height: 100%;
            max-height: 400px;
            background: #000;
        }

        .player-info {
            padding: 15px;
            background: #000;
            border-top: 1px solid #333;
            color: #666;
            font-size: 0.9em;
        }

        /* MODALES (igual que antes) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 30px;
            padding: 12px 25px;
            color: #D4AF37;
            transition: 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            
            .player-column {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>🏴‍☠️ LA PERLA NEGRA</h1>
        </div>
        <div class="header-buttons">
            <div class="icon-btn" id="warpBtn">🌐 WARP</div>
            <div class="icon-btn" id="parentalBtn">🔒 CONTROL</div>
        </div>
    </div>

    <div class="main-content">
        <!-- COLUMNA IZQUIERDA: LISTA -->
        <div class="channels-column">
            <div class="input-area">
                <div class="url-box">
                    <input type="text" id="m3uUrl" placeholder="URL de lista M3U...">
                    <button id="loadBtn">CARGAR</button>
                </div>
                <div class="stats-row">
                    <span>📺 <span id="liveCount">0</span></span>
                    <span>🎬 <span id="movieCount">0</span></span>
                    <span>📚 <span id="seriesCount">0</span></span>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" data-tab="live">TV</div>
                <div class="tab" data-tab="movies">PELÍCULAS</div>
                <div class="tab" data-tab="series">SERIES</div>
            </div>

            <div class="channels-list" id="channelsList">
                <div style="text-align: center; padding: 30px; color: #666;">
                    Cargá una lista M3U para empezar
                </div>
            </div>
        </div>

        <!-- COLUMNA DERECHA: REPRODUCTOR -->
        <div class="player-column">
            <div class="player-container">
                <div class="player-header">
                    <h3 id="nowPlaying">⚓ Seleccioná un canal</h3>
                </div>
                <div class="video-wrapper">
                    <video id="videoPlayer" controls playsinline></video>
                </div>
                <div class="player-info" id="playerStatus">
                    <span>🌐 WARP: <span id="warpStatus">OFF</span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PARENTAL (simplificado) -->
    <div class="modal" id="parentalModal">
        <div class="modal-content">
            <h3 style="color: #D4AF37; margin-bottom: 20px;">🔒 CONTROL PARENTAL</h3>
            <div id="categoriesList" style="margin-bottom: 20px;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="icon-btn" style="flex:1; justify-content: center;" id="saveParentalBtn">GUARDAR</button>
                <button class="icon-btn" style="flex:1; justify-content: center;" id="closeParentalBtn">CERRAR</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== CÓDIGO SIMPLIFICADO ====================
        const WORKER_URL = 'https://quiet-lake-ca31perlanegraproxy.rickgar600.workers.dev';
        
        class PerlaNegra {
            constructor() {
                this.useWarp = true;
                this.channels = [];
                this.movies = [];
                this.series = [];
                this.blockedCategories = JSON.parse(localStorage.getItem('blocked')) || [];
                
                this.init();
            }

            init() {
                // Eventos
                document.getElementById('warpBtn').onclick = () => this.toggleWarp();
                document.getElementById('parentalBtn').onclick = () => this.openParental();
                document.getElementById('loadBtn').onclick = () => this.loadM3U();
                document.getElementById('closeParentalBtn').onclick = () => this.closeParental();
                document.getElementById('saveParentalBtn').onclick = () => this.saveParental();
                
                // Pestañas
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.onclick = () => this.switchTab(tab.dataset.tab);
                });
                
                this.updateWarpUI();
            }

            toggleWarp() {
                this.useWarp = !this.useWarp;
                localStorage.setItem('warp', this.useWarp);
                this.updateWarpUI();
                this.toast(this.useWarp ? '🌐 WARP activado' : '🌐 WARP desactivado');
            }

            updateWarpUI() {
                const btn = document.getElementById('warpBtn');
                btn.classList.toggle('active', this.useWarp);
                document.getElementById('warpStatus').textContent = this.useWarp ? 'ON' : 'OFF';
            }

            async playChannel(url, name) {
                if (!url) return;
                
                let streamUrl = url;
                if (this.useWarp && WORKER_URL) {
                    streamUrl = `${WORKER_URL}/?url=${encodeURIComponent(url)}`;
                }
                
                const video = document.getElementById('videoPlayer');
                video.src = streamUrl;
                video.load();
                
                document.getElementById('nowPlaying').textContent = `⚓ ${name || 'Reproduciendo'}`;
                
                try {
                    await video.play();
                    this.toast(`▶️ ${name}`);
                } catch (error) {
                    console.error('Error:', error);
                    this.toast('❌ Error al reproducir', 'error');
                    
                    // Si falla con WARP, intentar sin él
                    if (this.useWarp) {
                        this.useWarp = false;
                        this.updateWarpUI();
                        this.playChannel(url, name);
                    }
                }
            }

            async loadM3U() {
                const url = document.getElementById('m3uUrl').value.trim();
                if (!url) {
                    this.toast('❌ Ingresá una URL', 'error');
                    return;
                }

                this.toast('⚓ Cargando...');
                
                try {
                    const response = await fetch(url, {
                        headers: { 'User-Agent': 'okhttp/4.11.0' }
                    });
                    const text = await response.text();
                    this.parseM3U(text);
                } catch (error) {
                    this.toast('❌ Error al cargar', 'error');
                }
            }

            parseM3U(text) {
                this.channels = [];
                this.movies = [];
                this.series = [];
                
                const lines = text.split('\n');
                let current = null;
                
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) {
                        const match = line.match(/group-title="([^"]+)"/);
                        const category = match ? match[1] : 'General';
                        
                        const nameMatch = line.match(/,(.+)$/);
                        const name = nameMatch ? nameMatch[1] : 'Canal';
                        
                        current = { name, category };
                    } else if (line && !line.startsWith('#') && current) {
                        current.url = line;
                        
                        // Clasificar
                        if (line.includes('.mp4') || line.includes('.mkv') || 
                            current.name.toLowerCase().includes('película')) {
                            this.movies.push(current);
                        } else {
                            this.channels.push(current);
                        }
                        current = null;
                    }
                });
                
                this.updateCounts();
                this.renderChannels();
                this.toast(`✅ ${this.channels.length} canales, ${this.movies.length} películas`);
            }

            renderChannels() {
                const container = document.getElementById('channelsList');
                const activeTab = document.querySelector('.tab.active').dataset.tab;
                
                let items = [];
                if (activeTab === 'live') items = this.channels;
                else if (activeTab === 'movies') items = this.movies;
                else items = this.series;
                
                if (items.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 30px; color: #666;">No hay contenido</div>';
                    return;
                }
                
                container.innerHTML = items.map(item => {
                    const blocked = this.blockedCategories.some(c => 
                        item.category?.toLowerCase().includes(c.toLowerCase())
                    );
                    
                    return `
                        <div class="channel-item ${blocked ? 'blocked' : ''}" 
                             onclick="${!blocked ? `perla.playChannel('${item.url}', '${item.name.replace(/'/g, "\\'")}')` : ''}">
                            <span class="channel-name">${item.name}</span>
                            <span class="channel-category">${item.category || 'General'}</span>
                        </div>
                    `;
                }).join('');
            }

            switchTab(tab) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
                this.renderChannels();
            }

            updateCounts() {
                document.getElementById('liveCount').textContent = this.channels.length;
                document.getElementById('movieCount').textContent = this.movies.length;
                document.getElementById('seriesCount').textContent = this.series.length;
            }

            openParental() {
                const list = document.getElementById('categoriesList');
                const categories = ['+18', 'Adultos', 'XXX', 'Violencia', 'Terror'];
                
                list.innerHTML = categories.map(cat => `
                    <div style="display: flex; align-items: center; margin: 10px 0;">
                        <input type="checkbox" value="${cat}" ${this.blockedCategories.includes(cat) ? 'checked' : ''}>
                        <span style="margin-left: 10px;">${cat}</span>
                    </div>
                `).join('');
                
                document.getElementById('parentalModal').classList.add('active');
            }

            saveParental() {
                const checkboxes = document.querySelectorAll('#categoriesList input:checked');
                this.blockedCategories = Array.from(checkboxes).map(cb => cb.value);
                localStorage.setItem('blocked', JSON.stringify(this.blockedCategories));
                this.renderChannels();
                this.closeParental();
                this.toast('✅ Guardado');
            }

            closeParental() {
                document.getElementById('parentalModal').classList.remove('active');
            }

            toast(msg, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = 'toast show';
                if (type === 'error') toast.style.borderColor = '#ff4444';
                setTimeout(() => toast.classList.remove('show'), 2000);
            }
        }

        const perla = new PerlaNegra();
        window.perla = perla;
    </script>
</body>
</html>
