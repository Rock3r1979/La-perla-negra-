<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏴‍☠️ LA PERLA NEGRA - IPTV Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a0f0a;
            min-height: 100vh;
            color: white;
        }

        /* Header simple */
        .header {
            background: #2c1810;
            border-bottom: 3px solid #D4AF37;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            color: #D4AF37;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 2px;
        }

        .header p {
            color: #cdb38c;
            margin-top: 5px;
            font-size: 0.9em;
        }

        /* Contenedor principal */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Input simple */
        .input-group {
            background: #2c1810;
            border: 2px solid #8B4513;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            margin: 20px 0;
            overflow: hidden;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: white;
            font-size: 1em;
            outline: none;
        }

        .input-group input::placeholder {
            color: #6b4f3a;
        }

        .input-group button {
            background: #D4AF37;
            border: none;
            padding: 15px 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .input-group button:hover {
            background: #FFD700;
        }

        /* Panel parental simple */
        .parental-panel {
            background: #2c1810;
            border: 2px solid #8B4513;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .parental-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #D4AF37;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .pin-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pin-row input {
            background: #1a0f0a;
            border: 2px solid #8B4513;
            border-radius: 10px;
            padding: 12px 15px;
            color: #D4AF37;
            font-size: 1.2em;
            letter-spacing: 4px;
            text-align: center;
            width: 120px;
        }

        .btn {
            background: #8B4513;
            border: 2px solid #D4AF37;
            border-radius: 10px;
            padding: 12px 20px;
            color: #D4AF37;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: #D4AF37;
            color: #2c1810;
        }

        .btn.danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn.danger:hover {
            background: #ff4444;
            color: white;
        }

        .btn.small {
            padding: 8px 15px;
            font-size: 0.9em;
        }

        /* Selector de categorías simple */
        .category-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .category-option {
            background: #1a0f0a;
            border: 1px solid #8B4513;
            border-radius: 30px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .category-option.locked {
            border-color: #ff4444;
            color: #ff6b6b;
        }

        .category-option i {
            font-size: 0.8em;
        }

        /* Reproductor de video */
        .player-section {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        .player-section.active {
            display: block;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        .player-controls {
            background: #2c1810;
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .now-playing {
            flex: 1;
            color: #D4AF37;
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Lista de canales simple */
        .channels-list {
            background: #2c1810;
            border: 2px solid #8B4513;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #8B4513;
            cursor: pointer;
            transition: 0.2s;
        }

        .channel-item:hover {
            background: #8B4513;
        }

        .channel-item:last-child {
            border-bottom: none;
        }

        .channel-icon {
            width: 30px;
            text-align: center;
            margin-right: 15px;
            font-size: 1.2em;
        }

        .channel-name {
            flex: 1;
        }

        .channel-lock {
            color: #ff4444;
            margin-left: 10px;
        }

        .channel-play {
            color: #D4AF37;
            margin-left: 10px;
            opacity: 0.5;
        }

        .channel-item:hover .channel-play {
            opacity: 1;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #8B4513;
            border-top: 4px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Modal PIN simple */
        .pin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .pin-modal.active {
            display: flex;
        }

        .pin-modal-content {
            background: #2c1810;
            border: 3px solid #D4AF37;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .pin-display {
            font-size: 2.5em;
            letter-spacing: 10px;
            margin: 20px 0;
            color: #D4AF37;
        }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .pin-key {
            background: #1a0f0a;
            border: 1px solid #8B4513;
            border-radius: 10px;
            padding: 15px;
            font-size: 1.5em;
            cursor: pointer;
        }

        .pin-key:hover {
            background: #8B4513;
        }

        /* Mensajes */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2c1810;
            border: 2px solid #D4AF37;
            border-radius: 50px;
            padding: 12px 25px;
            color: #D4AF37;
            transition: 0.3s;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-color: #ff4444;
            background: #4a1f1f;
        }

        @media (max-width: 600px) {
            .pin-row {
                flex-direction: column;
            }
            
            .pin-row input {
                width: 100%;
            }
            
            .input-group {
                flex-direction: column;
                border-radius: 15px;
            }
            
            .input-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏴‍☠️ LA PERLA NEGRA</h1>
        <p>EL TESORO IPTV MÁS BUSCADO</p>
    </div>

    <div class="container">
        <!-- Panel parental SIMPLE -->
        <div class="parental-panel">
            <div class="parental-header">
                <span>⚓ CAMAROTE DEL CAPITÁN</span>
            </div>
            
            <div class="pin-row">
                <input type="password" id="pinInput" placeholder="****" maxlength="4" pattern="\d*">
                <button class="btn" id="setPinBtn">🔐 GUARDAR PIN</button>
                <button class="btn danger" id="disablePinBtn">🔓 QUITAR PIN</button>
            </div>

            <!-- Categorías bloqueadas SIMPLE -->
            <div style="margin-top: 20px;">
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                    <span>🚫 BLOQUEAR:</span>
                    <button class="btn small" id="addCategoryBtn">+ AÑADIR</button>
                    <button class="btn small danger" id="unlockAllBtn">✖ QUITAR TODO</button>
                </div>
                <div class="category-selector" id="categoryList"></div>
            </div>
        </div>

        <!-- Reproductor SIMPLE -->
        <div class="player-section" id="playerSection">
            <video id="videoPlayer" controls playsinline></video>
            <div class="player-controls">
                <span class="now-playing" id="nowPlaying">⚓ Navegando...</span>
                <button class="btn small" id="closePlayerBtn">✖ CERRAR</button>
            </div>
        </div>

        <!-- Input URL SIMPLE -->
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="🌊 Pega tu lista M3U o enlace Xtream...">
            <button id="loadBtn">⚓ CARGAR TESORO</button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Navegando hacia el tesoro...</p>
        </div>

        <!-- Lista de canales SIMPLE -->
        <div class="channels-list" id="channelsList">
            <div style="text-align: center; padding: 30px; color: #6b4f3a;">
                <div style="font-size: 3em; margin-bottom: 10px;">🏴‍☠️</div>
                <p>Carga una lista para empezar</p>
            </div>
        </div>

        <!-- Modal PIN SIMPLE -->
        <div class="pin-modal" id="pinModal">
            <div class="pin-modal-content">
                <h3 style="color: #D4AF37;">🔒 INTRODUCE PIN</h3>
                <div class="pin-display" id="modalPinDisplay">****</div>
                <div class="pin-grid" id="pinGrid"></div>
                <button class="btn danger" id="cancelPinBtn" style="width: 100%;">CANCELAR</button>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ==================== CONTROL PARENTAL SIMPLE ====================
        class ParentalSimple {
            constructor() {
                this.pin = localStorage.getItem('perlaPin') || null;
                this.blocked = JSON.parse(localStorage.getItem('perlaBlocked')) || ['+18', 'Adultos'];
                this.categories = ['+18', 'Adultos', 'Terror', 'Violencia'];
                this.channels = [];
                
                this.init();
            }

            init() {
                this.renderCategories();
                this.setupListeners();
            }

            setupListeners() {
                document.getElementById('setPinBtn').onclick = () => {
                    const pin = document.getElementById('pinInput').value;
                    if (pin && pin.length === 4 && /^\d+$/.test(pin)) {
                        this.pin = pin;
                        localStorage.setItem('perlaPin', pin);
                        this.toast('✅ PIN guardado');
                        document.getElementById('pinInput').value = '';
                    } else {
                        this.toast('❌ 4 números', 'error');
                    }
                };

                document.getElementById('disablePinBtn').onclick = () => {
                    if (this.pin) {
                        this.showPinModal('DESBLOQUEAR', () => {
                            this.pin = null;
                            localStorage.removeItem('perlaPin');
                            this.toast('🔓 PIN eliminado');
                        });
                    } else {
                        this.pin = null;
                        localStorage.removeItem('perlaPin');
                        this.toast('🔓 Sin PIN');
                    }
                };

                document.getElementById('addCategoryBtn').onclick = () => {
                    const cat = prompt('Categoría a bloquear:');
                    if (cat && cat.trim() && !this.blocked.includes(cat.trim())) {
                        this.blocked.push(cat.trim());
                        localStorage.setItem('perlaBlocked', JSON.stringify(this.blocked));
                        this.renderCategories();
                        this.renderChannels();
                    }
                };

                document.getElementById('unlockAllBtn').onclick = () => {
                    if (this.pin) {
                        this.showPinModal('DESBLOQUEAR TODO', () => {
                            this.blocked = [];
                            localStorage.setItem('perlaBlocked', '[]');
                            this.renderCategories();
                            this.renderChannels();
                            this.toast('🔓 Todo desbloqueado');
                        });
                    } else {
                        this.blocked = [];
                        localStorage.setItem('perlaBlocked', '[]');
                        this.renderCategories();
                        this.renderChannels();
                        this.toast('🔓 Todo desbloqueado');
                    }
                };

                document.getElementById('closePlayerBtn').onclick = () => {
                    this.closePlayer();
                };

                document.getElementById('loadBtn').onclick = () => this.loadList();
            }

            renderCategories() {
                const list = document.getElementById('categoryList');
                list.innerHTML = this.categories.map(cat => `
                    <div class="category-option ${this.blocked.includes(cat) ? 'locked' : ''}" onclick="parental.toggleCategory('${cat}')">
                        <span>${cat}</span>
                        <span>${this.blocked.includes(cat) ? '🔒' : '🔓'}</span>
                    </div>
                `).join('');
            }

            toggleCategory(cat) {
                const index = this.blocked.indexOf(cat);
                if (index === -1) {
                    this.blocked.push(cat);
                } else {
                    this.blocked.splice(index, 1);
                }
                localStorage.setItem('perlaBlocked', JSON.stringify(this.blocked));
                this.renderCategories();
                this.renderChannels();
            }

            isBlocked(channel) {
                if (!channel || !channel.category) return false;
                return this.blocked.some(b => 
                    channel.category.toLowerCase().includes(b.toLowerCase())
                );
            }

            // ==================== REPRODUCCIÓN REAL ====================
            playChannel(url, name) {
                if (!url || url === '#') {
                    this.toast('❌ URL inválida', 'error');
                    return;
                }

                console.log('Reproduciendo:', url);
                
                const video = document.getElementById('videoPlayer');
                const player = document.getElementById('playerSection');
                const nowPlaying = document.getElementById('nowPlaying');
                
                // Detener reproducción anterior
                video.pause();
                video.removeAttribute('src');
                video.load();
                
                // Cargar nueva URL
                video.src = url;
                video.load();
                
                // Mostrar reproductor
                player.classList.add('active');
                nowPlaying.textContent = `⚓ ${name || 'Reproduciendo'}`;
                
                // Intentar reproducir
                const playPromise = video.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        this.toast(`▶️ Reproduciendo: ${name}`);
                    }).catch(error => {
                        console.error('Error reproducción:', error);
                        this.toast('❌ Error al reproducir. ¿Formato soportado?', 'error');
                        
                        // Fallback: intentar abrir en nueva pestaña
                        if (confirm('¿Abrir enlace directamente?')) {
                            window.open(url, '_blank');
                        }
                    });
                }
                
                // Eventos del video
                video.onerror = (e) => {
                    console.error('Video error:', video.error);
                    this.toast(`❌ Error ${video.error?.code || 'desconocido'}`, 'error');
                };
                
                video.onstalled = () => this.toast('⏳ Buffering...');
                video.onwaiting = () => this.toast('⏳ Cargando...');
                video.onplaying = () => this.toast('▶️ Reproduciendo');
            }

            closePlayer() {
                const video = document.getElementById('videoPlayer');
                const player = document.getElementById('playerSection');
                
                video.pause();
                video.removeAttribute('src');
                video.load();
                player.classList.remove('active');
            }

            // ==================== CARGAR LISTA SIMULADA ====================
            loadList() {
                const url = document.getElementById('urlInput').value.trim();
                if (!url) {
                    this.toast('❌ Introduce una URL', 'error');
                    return;
                }

                document.getElementById('loading').style.display = 'block';
                document.getElementById('channelsList').innerHTML = '';

                // Simular carga (aquí iría tu llamada real)
                setTimeout(() => {
                    // Canales de ejemplo con URLs REALES de prueba
                    this.channels = [
                        { 
                            name: '📺 Canal 24h (Prueba)', 
                            url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 
                            category: 'Noticias',
                            type: 'HLS'
                        },
                        { 
                            name: '🎬 Big Buck Bunny', 
                            url: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4', 
                            category: 'Películas',
                            type: 'MP4'
                        },
                        { 
                            name: '📡 Tears of Steel', 
                            url: 'https://test-streams.mux.dev/bbb_sunflower_1080p_30fps_normal.mp4', 
                            category: 'Cine',
                            type: 'MP4'
                        },
                        { 
                            name: '🔞 Canal +18 (Ejemplo)', 
                            url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 
                            category: '+18',
                            type: 'HLS'
                        }
                    ];
                    
                    document.getElementById('loading').style.display = 'none';
                    this.renderChannels();
                    this.toast('✅ Lista cargada');
                }, 1000);
            }

            renderChannels() {
                const list = document.getElementById('channelsList');
                
                if (this.channels.length === 0) {
                    list.innerHTML = '<div style="text-align: center; padding: 30px;">No hay canales</div>';
                    return;
                }

                list.innerHTML = this.channels.map(ch => {
                    const blocked = this.isBlocked(ch);
                    return `
                        <div class="channel-item" ${!blocked ? `onclick="parental.playChannel('${ch.url}', '${ch.name}')"` : ''}>
                            <span class="channel-icon">${blocked ? '🔒' : '📺'}</span>
                            <span class="channel-name">${ch.name}</span>
                            <span style="color: #8B4513; font-size: 0.8em;">${ch.type || ''}</span>
                            ${blocked ? '<span class="channel-lock">🔒</span>' : '<span class="channel-play">▶️</span>'}
                        </div>
                    `;
                }).join('');
            }

            // ==================== MODAL PIN ====================
            showPinModal(reason, onSuccess) {
                const modal = document.getElementById('pinModal');
                const display = document.getElementById('modalPinDisplay');
                const grid = document.getElementById('pinGrid');
                let pin = '';
                
                modal.classList.add('active');
                display.textContent = '****';
                
                grid.innerHTML = '';
                for (let i = 1; i <= 9; i++) {
                    const btn = document.createElement('div');
                    btn.className = 'pin-key';
                    btn.textContent = i;
                    btn.onclick = () => {
                        if (pin.length < 4) {
                            pin += i;
                            display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                        }
                    };
                    grid.appendChild(btn);
                }
                
                const zeroBtn = document.createElement('div');
                zeroBtn.className = 'pin-key';
                zeroBtn.textContent = '0';
                zeroBtn.onclick = () => {
                    if (pin.length < 4) {
                        pin += '0';
                        display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                    }
                };
                grid.appendChild(zeroBtn);
                
                const delBtn = document.createElement('div');
                delBtn.className = 'pin-key';
                delBtn.innerHTML = '⌫';
                delBtn.onclick = () => {
                    pin = pin.slice(0, -1);
                    display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                };
                grid.appendChild(delBtn);
                
                const okBtn = document.createElement('div');
                okBtn.className = 'pin-key';
                okBtn.innerHTML = '✓';
                okBtn.onclick = () => {
                    if (pin === this.pin) {
                        modal.classList.remove('active');
                        onSuccess();
                    } else {
                        this.toast('❌ PIN incorrecto', 'error');
                        pin = '';
                        display.textContent = '****';
                    }
                };
                grid.appendChild(okBtn);

                document.getElementById('cancelPinBtn').onclick = () => {
                    modal.classList.remove('active');
                };
            }

            // ==================== TOAST ====================
            toast(msg, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = 'toast show' + (type === 'error' ? ' error' : '');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }
        }

        // Inicializar
        const parental = new ParentalSimple();
        window.parental = parental;
    </script>
</body>
</html>
