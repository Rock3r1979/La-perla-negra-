<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏴‍☠️ LA PERLA NEGRA - XTREAM IPTV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        /* Header con estilo del grupo */
        .header {
            background: linear-gradient(135deg, #000000, #1a1a1a);
            border-bottom: 3px solid #D4AF37;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            color: #D4AF37;
            font-size: 1.8em;
            text-shadow: 2px 2px 0 #000;
        }

        .badge {
            background: #D4AF37;
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        /* Botón WARP */
        .warp-btn {
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .warp-btn.active {
            background: #D4AF37;
            color: #000;
        }

        .warp-btn.active .warp-indicator {
            background: #00ff00;
        }

        .warp-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
            transition: 0.3s;
        }

        /* Panel principal */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Panel parental */
        .parental-section {
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            color: #D4AF37;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .pin-area {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .pin-input {
            background: #000;
            border: 2px solid #D4AF37;
            border-radius: 10px;
            padding: 12px 15px;
            color: #D4AF37;
            font-size: 1.3em;
            letter-spacing: 8px;
            text-align: center;
            width: 150px;
        }

        .btn {
            background: #D4AF37;
            border: none;
            border-radius: 10px;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn.dark {
            background: #333;
            color: #D4AF37;
            border: 1px solid #D4AF37;
        }

        .btn.dark:hover {
            background: #D4AF37;
            color: #000;
        }

        .btn.danger {
            background: #660000;
            color: #ff9999;
            border: 1px solid #ff4444;
        }

        /* Categorías a bloquear */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .cat-item {
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cat-item.selected {
            border-color: #ff4444;
            background: #2a0000;
        }

        .cat-item .lock {
            margin-left: auto;
            color: #666;
        }

        .cat-item.selected .lock {
            color: #ff4444;
        }

        .save-btn {
            background: #D4AF37;
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Input URL */
        .url-section {
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .url-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .url-input-group input {
            flex: 1;
            min-width: 250px;
            background: #000;
            border: 1px solid #D4AF37;
            border-radius: 10px;
            padding: 15px;
            color: white;
        }

        /* Pestañas */
        .tabs {
            display: flex;
            gap: 5px;
            margin: 20px 0;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }

        .tab {
            padding: 12px 25px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab.active {
            background: #D4AF37;
            color: #000;
            border-color: #D4AF37;
        }

        .tab-content {
            display: none;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 0 10px 10px 10px;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        /* Listas de contenido */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }

        .item-card {
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .item-card:hover {
            border-color: #D4AF37;
            transform: translateY(-2px);
        }

        .item-card.blocked {
            opacity: 0.4;
            position: relative;
            pointer-events: none;
        }

        .item-card.blocked::after {
            content: '🔒';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2em;
        }

        .item-title {
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-category {
            color: #D4AF37;
            font-size: 0.8em;
        }

        /* Reproductor */
        .player-section {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 3px solid #D4AF37;
            display: none;
            z-index: 1000;
        }

        .player-section.active {
            display: block;
        }

        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #1a1a1a;
        }

        .player-title {
            color: #D4AF37;
            font-weight: bold;
        }

        .close-player {
            background: none;
            border: none;
            color: #D4AF37;
            font-size: 1.5em;
            cursor: pointer;
        }

        video {
            width: 100%;
            max-height: 400px;
            background: #000;
        }

        /* Modal PIN */
        .pin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .pin-modal.active {
            display: flex;
        }

        .pin-modal-content {
            background: #1a1a1a;
            border: 3px solid #D4AF37;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
        }

        .pin-numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .pin-number {
            background: #000;
            border: 1px solid #D4AF37;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            font-size: 1.5em;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 30px;
            padding: 12px 25px;
            color: #D4AF37;
            transition: 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-color: #ff4444;
            background: #330000;
            color: #ff9999;
        }

        @media (max-width: 768px) {
            .pin-area {
                flex-direction: column;
            }
            
            .pin-input {
                width: 100%;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
            
            .tab {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>🏴‍☠️ LA PERLA NEGRA</h1>
            <span class="badge">XTREAM v2.0</span>
        </div>
        
        <!-- Botón WARP 1.1.1.1 -->
        <div class="warp-btn" id="warpBtn">
            <span class="warp-indicator" id="warpIndicator"></span>
            <span>WARP 1.1.1.1</span>
            <span id="warpStatus">OFF</span>
        </div>
    </div>

    <div class="container">
        <!-- PANEL PARENTAL -->
        <div class="parental-section">
            <div class="section-title">
                <span>⚓ CAMAROTE DEL CAPITÁN</span>
                <span style="color: #666; font-size: 0.8em;">(Control Parental)</span>
            </div>
            
            <!-- Área PIN -->
            <div class="pin-area">
                <input type="password" class="pin-input" id="pinInput" placeholder="****" maxlength="4">
                <button class="btn dark" id="setPinBtn">🔐 ESTABLECER PIN</button>
                <button class="btn danger" id="disablePinBtn">🔓 ELIMINAR PIN</button>
            </div>

            <!-- Categorías disponibles -->
            <div style="margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span>📋 CATEGORÍAS DISPONIBLES</span>
                    <span style="color: #D4AF37;">Selecciona las que quieras BLOQUEAR</span>
                </div>
                
                <div class="categories-grid" id="categoriesContainer"></div>
                
                <!-- Botón GUARDAR -->
                <button class="save-btn" id="saveParentalBtn">
                    ⚓ GUARDAR CONFIGURACIÓN PARENTAL
                </button>
            </div>
        </div>

        <!-- INPUT URL -->
        <div class="url-section">
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <input type="text" id="serverUrl" placeholder="URL del servidor Xtream (ej: http://ejemplo.com:8080)" style="flex: 2; background: #000; border: 1px solid #D4AF37; border-radius: 10px; padding: 15px; color: white;">
                <input type="text" id="username" placeholder="Usuario" style="flex: 1; background: #000; border: 1px solid #D4AF37; border-radius: 10px; padding: 15px; color: white;">
                <input type="password" id="password" placeholder="Contraseña" style="flex: 1; background: #000; border: 1px solid #D4AF37; border-radius: 10px; padding: 15px; color: white;">
                <button class="btn" id="connectBtn" style="flex: 0.5;">🔌 CONECTAR</button>
            </div>
        </div>

        <!-- PESTAÑAS -->
        <div class="tabs">
            <div class="tab active" data-tab="live">
                <span>📺</span> TV <span id="liveCount" style="margin-left: 5px; color: #D4AF37;"></span>
            </div>
            <div class="tab" data-tab="movies">
                <span>🎬</span> PELÍCULAS <span id="moviesCount" style="margin-left: 5px; color: #D4AF37;"></span>
            </div>
            <div class="tab" data-tab="series">
                <span>📚</span> SERIES <span id="seriesCount" style="margin-left: 5px; color: #D4AF37;"></span>
            </div>
        </div>

        <!-- CONTENIDO -->
        <div id="liveTab" class="tab-content active">
            <div class="items-grid" id="liveContent"></div>
        </div>

        <div id="moviesTab" class="tab-content">
            <div class="items-grid" id="moviesContent"></div>
        </div>

        <div id="seriesTab" class="tab-content">
            <div class="items-grid" id="seriesContent"></div>
        </div>
    </div>

    <!-- REPRODUCTOR -->
    <div class="player-section" id="playerSection">
        <div class="player-header">
            <span class="player-title" id="playerTitle">⚓ Navegando...</span>
            <button class="close-player" id="closePlayerBtn">✖</button>
        </div>
        <video id="videoPlayer" controls playsinline></video>
    </div>

    <!-- MODAL PIN -->
    <div class="pin-modal" id="pinModal">
        <div class="pin-modal-content">
            <h3 style="color: #D4AF37; text-align: center;">🔒 INTRODUCE PIN</h3>
            <div style="font-size: 2.5em; letter-spacing: 10px; text-align: center; margin: 20px 0; color: #D4AF37;" id="modalPinDisplay">****</div>
            <div class="pin-numbers" id="pinNumbers"></div>
            <button class="btn dark" id="cancelPinBtn" style="width: 100%;">CANCELAR</button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== CONFIGURACIÓN ====================
        const USER_AGENT = 'okhttp/4.11.0';
        
        // ==================== CLASE PRINCIPAL ====================
        class PerlaNegra {
            constructor() {
                // Estado
                this.pin = localStorage.getItem('perlaPin') || null;
                this.blockedCategories = JSON.parse(localStorage.getItem('perlaBlocked')) || [];
                this.warpEnabled = false;
                this.userData = null;
                this.allCategories = [];
                
                // Datos Xtream
                this.liveStreams = [];
                this.vodStreams = [];
                this.seriesList = [];
                
                this.init();
            }

            init() {
                this.loadCategories();
                this.setupEventListeners();
                this.checkWarpStatus();
            }

            loadCategories() {
                // Categorías comunes que puede bloquear el usuario
                this.allCategories = [
                    '+18', 'Adultos', 'XXX', 'Solo Adultos', 'Cine 18',
                    'Nocturno', 'Terror', 'Violencia', 'Sangre',
                    'Contenido Adulto', 'Solo +18', 'Para Mayores'
                ];
                
                this.renderCategories();
            }

            renderCategories() {
                const container = document.getElementById('categoriesContainer');
                container.innerHTML = this.allCategories.map(cat => `
                    <div class="cat-item ${this.blockedCategories.includes(cat) ? 'selected' : ''}" data-category="${cat}">
                        <span>${cat}</span>
                        <span class="lock">${this.blockedCategories.includes(cat) ? '🔒' : '🔓'}</span>
                    </div>
                `).join('');
                
                // Añadir evento click a cada categoría
                document.querySelectorAll('.cat-item').forEach(item => {
                    item.addEventListener('click', () => this.toggleCategory(item.dataset.category));
                });
            }

            toggleCategory(category) {
                const index = this.blockedCategories.indexOf(category);
                if (index === -1) {
                    this.blockedCategories.push(category);
                } else {
                    this.blockedCategories.splice(index, 1);
                }
                this.renderCategories();
            }

            // ==================== WARP 1.1.1.1 ====================
            toggleWarp() {
                this.warpEnabled = !this.warpEnabled;
                localStorage.setItem('warpEnabled', this.warpEnabled);
                this.updateWarpUI();
                
                if (this.warpEnabled) {
                    this.toast('🌐 WARP activado - Usando DNS 1.1.1.1');
                } else {
                    this.toast('🌐 WARP desactivado');
                }
            }

            updateWarpUI() {
                const btn = document.getElementById('warpBtn');
                const indicator = document.getElementById('warpIndicator');
                const status = document.getElementById('warpStatus');
                
                if (this.warpEnabled) {
                    btn.classList.add('active');
                    indicator.style.background = '#00ff00';
                    status.textContent = 'ON';
                } else {
                    btn.classList.remove('active');
                    indicator.style.background = '#666';
                    status.textContent = 'OFF';
                }
            }

            checkWarpStatus() {
                this.warpEnabled = localStorage.getItem('warpEnabled') === 'true';
                this.updateWarpUI();
            }

            // ==================== CONEXIÓN XTREAM ====================
            async connectXtream() {
                const server = document.getElementById('serverUrl').value.trim();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                
                if (!server || !username || !password) {
                    this.toast('❌ Completá todos los campos', 'error');
                    return;
                }

                this.toast('🔌 Conectando...');
                
                try {
                    // Construir URLs con User-Agent
                    const baseUrl = server.endsWith('/') ? server.slice(0, -1) : server;
                    const apiUrl = `${baseUrl}/player_api.php?username=${username}&password=${password}`;
                    
                    // Obtener info de usuario
                    const userResponse = await fetch(apiUrl, {
                        headers: { 'User-Agent': USER_AGENT }
                    });
                    this.userData = await userResponse.json();
                    
                    if (this.userData.user_info?.status !== 'Active') {
                        this.toast('❌ Cuenta no activa', 'error');
                        return;
                    }
                    
                    // Cargar streams
                    await Promise.all([
                        this.loadLiveStreams(baseUrl, username, password),
                        this.loadVodStreams(baseUrl, username, password),
                        this.loadSeries(baseUrl, username, password)
                    ]);
                    
                    this.updateCounts();
                    this.renderContent();
                    this.toast('✅ Conectado correctamente');
                    
                } catch (error) {
                    console.error(error);
                    this.toast('❌ Error de conexión', 'error');
                }
            }

            async loadLiveStreams(baseUrl, username, password) {
                const url = `${baseUrl}/player_api.php?username=${username}&password=${password}&action=get_live_streams`;
                const response = await fetch(url, {
                    headers: { 'User-Agent': USER_AGENT }
                });
                this.liveStreams = await response.json();
            }

            async loadVodStreams(baseUrl, username, password) {
                const url = `${baseUrl}/player_api.php?username=${username}&password=${password}&action=get_vod_streams`;
                const response = await fetch(url, {
                    headers: { 'User-Agent': USER_AGENT }
                });
                this.vodStreams = await response.json();
            }

            async loadSeries(baseUrl, username, password) {
                const url = `${baseUrl}/player_api.php?username=${username}&password=${password}&action=get_series`;
                const response = await fetch(url, {
                    headers: { 'User-Agent': USER_AGENT }
                });
                this.seriesList = await response.json();
            }

            // ==================== REPRODUCCIÓN ====================
            playStream(stream, type) {
                if (!stream) return;
                
                // Verificar si está bloqueado por categoría
                if (this.isBlocked(stream)) {
                    this.toast('🔒 Contenido bloqueado por control parental', 'error');
                    return;
                }

                const server = document.getElementById('serverUrl').value.trim();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                
                let url;
                if (type === 'live') {
                    url = `${server}/live/${username}/${password}/${stream.stream_id}.m3u8`;
                } else if (type === 'movie') {
                    url = `${server}/movie/${username}/${password}/${stream.stream_id}.mp4`;
                } else if (type === 'series') {
                    url = `${server}/series/${username}/${password}/${stream.series_id}.m3u8`;
                }

                const video = document.getElementById('videoPlayer');
                const player = document.getElementById('playerSection');
                const title = document.getElementById('playerTitle');
                
                // Detener reproducción anterior
                video.pause();
                video.removeAttribute('src');
                video.load();
                
                // Configurar headers (si se pudieran enviar, pero fetch no permite en video tag)
                // Usamos el User-Agent global para las peticiones de API, pero el video tag usará el del navegador
                
                // Cargar nueva URL
                video.src = url;
                video.load();
                
                // Mostrar reproductor
                player.classList.add('active');
                title.textContent = `⚓ ${stream.name}`;
                
                // Intentar reproducir
                video.play().catch(e => {
                    console.error('Error reproduciendo:', e);
                    this.toast('❌ Error al reproducir. ¿Formato soportado?', 'error');
                });
            }

            isBlocked(item) {
                if (!item || !item.category_id) return false;
                
                // Buscar la categoría del item
                const categoryName = this.getCategoryName(item.category_id);
                return this.blockedCategories.some(blocked => 
                    categoryName.toLowerCase().includes(blocked.toLowerCase())
                );
            }

            getCategoryName(categoryId) {
                // Esto debería buscar en las categorías cargadas
                // Por ahora simplificamos
                return '';
            }

            // ==================== RENDERIZADO ====================
            renderContent() {
                this.renderLive();
                this.renderMovies();
                this.renderSeries();
            }

            renderLive() {
                const container = document.getElementById('liveContent');
                container.innerHTML = this.liveStreams.map(stream => `
                    <div class="item-card" onclick="perla.playStream(${JSON.stringify(stream).replace(/"/g, '&quot;')}, 'live')">
                        <div class="item-title">${stream.name}</div>
                        <div class="item-category">ID: ${stream.stream_id}</div>
                    </div>
                `).join('');
            }

            renderMovies() {
                const container = document.getElementById('moviesContent');
                container.innerHTML = this.vodStreams.map(movie => `
                    <div class="item-card" onclick="perla.playStream(${JSON.stringify(movie).replace(/"/g, '&quot;')}, 'movie')">
                        <div class="item-title">${movie.name}</div>
                        <div class="item-category">${movie.rating || '★'} ⭐</div>
                    </div>
                `).join('');
            }

            renderSeries() {
                const container = document.getElementById('seriesContent');
                container.innerHTML = this.seriesList.map(series => `
                    <div class="item-card" onclick="perla.playStream(${JSON.stringify(series).replace(/"/g, '&quot;')}, 'series')">
                        <div class="item-title">${series.name}</div>
                        <div class="item-category">${series.episodes?.length || 0} episodios</div>
                    </div>
                `).join('');
            }

            updateCounts() {
                document.getElementById('liveCount').textContent = `(${this.liveStreams.length})`;
                document.getElementById('moviesCount').textContent = `(${this.vodStreams.length})`;
                document.getElementById('seriesCount').textContent = `(${this.seriesList.length})`;
            }

            // ==================== CONTROL PARENTAL ====================
            saveParentalConfig() {
                if (this.pin) {
                    this.showPinModal('GUARDAR', () => {
                        localStorage.setItem('perlaBlocked', JSON.stringify(this.blockedCategories));
                        this.toast('✅ Configuración guardada');
                    });
                } else {
                    localStorage.setItem('perlaBlocked', JSON.stringify(this.blockedCategories));
                    this.toast('✅ Configuración guardada (sin PIN)');
                }
            }

            setPin() {
                const pin = document.getElementById('pinInput').value;
                if (pin && pin.length === 4 && /^\d+$/.test(pin)) {
                    this.pin = pin;
                    localStorage.setItem('perlaPin', pin);
                    this.toast('✅ PIN guardado');
                    document.getElementById('pinInput').value = '';
                } else {
                    this.toast('❌ El PIN debe tener 4 números', 'error');
                }
            }

            disablePin() {
                if (this.pin) {
                    this.showPinModal('ELIMINAR PIN', () => {
                        this.pin = null;
                        localStorage.removeItem('perlaPin');
                        this.toast('🔓 PIN eliminado');
                    });
                } else {
                    this.pin = null;
                    localStorage.removeItem('perlaPin');
                    this.toast('🔓 Sin PIN');
                }
            }

            // ==================== MODAL PIN ====================
            showPinModal(action, onSuccess) {
                const modal = document.getElementById('pinModal');
                const display = document.getElementById('modalPinDisplay');
                const numbers = document.getElementById('pinNumbers');
                let pin = '';
                
                modal.classList.add('active');
                display.textContent = '****';
                
                numbers.innerHTML = '';
                for (let i = 1; i <= 9; i++) {
                    const btn = document.createElement('div');
                    btn.className = 'pin-number';
                    btn.textContent = i;
                    btn.onclick = () => {
                        if (pin.length < 4) {
                            pin += i;
                            display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                        }
                    };
                    numbers.appendChild(btn);
                }
                
                const zeroBtn = document.createElement('div');
                zeroBtn.className = 'pin-number';
                zeroBtn.textContent = '0';
                zeroBtn.onclick = () => {
                    if (pin.length < 4) {
                        pin += '0';
                        display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                    }
                };
                numbers.appendChild(zeroBtn);
                
                const delBtn = document.createElement('div');
                delBtn.className = 'pin-number';
                delBtn.innerHTML = '⌫';
                delBtn.onclick = () => {
                    pin = pin.slice(0, -1);
                    display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                };
                numbers.appendChild(delBtn);
                
                const okBtn = document.createElement('div');
                okBtn.className = 'pin-number';
                okBtn.innerHTML = '✓';
                okBtn.onclick = () => {
                    if (pin === this.pin) {
                        modal.classList.remove('active');
                        onSuccess();
                    } else {
                        this.toast('❌ PIN incorrecto', 'error');
                        pin = '';
                        display.textContent = '****';
                    }
                };
                numbers.appendChild(okBtn);

                document.getElementById('cancelPinBtn').onclick = () => {
                    modal.classList.remove('active');
                };
            }

            // ==================== UTILIDADES ====================
            closePlayer() {
                const player = document.getElementById('playerSection');
                const video = document.getElementById('videoPlayer');
                
                player.classList.remove('active');
                video.pause();
                video.removeAttribute('src');
                video.load();
            }

            toast(msg, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = 'toast show' + (type === 'error' ? ' error' : '');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            setupEventListeners() {
                // Eventos principales
                document.getElementById('setPinBtn').addEventListener('click', () => this.setPin());
                document.getElementById('disablePinBtn').addEventListener('click', () => this.disablePin());
                document.getElementById('saveParentalBtn').addEventListener('click', () => this.saveParentalConfig());
                document.getElementById('connectBtn').addEventListener('click', () => this.connectXtream());
                document.getElementById('closePlayerBtn').addEventListener('click', () => this.closePlayer());
                document.getElementById('warpBtn').addEventListener('click', () => this.toggleWarp());
                
                // Pestañas
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        const target = e.currentTarget.dataset.tab;
                        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        document.getElementById(`${target}Tab`).classList.add('active');
                    });
                });
            }
        }

        // Inicializar
        const perla = new PerlaNegra();
        window.perla = perla;
    </script>
</body>
</html>
