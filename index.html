<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏴‍☠️ LA PERLA NEGRA</title>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Cinzel', serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #2c1810;
            border: 3px solid #8B4513;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
        }

        h1 {
            font-family: 'Pirata One', cursive;
            font-size: 3.5em;
            background: linear-gradient(45deg, #D4AF37, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .input-section {
            background: #2c1810;
            border: 3px solid #8B4513;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            margin: 30px 0;
        }

        .input-section input {
            flex: 1;
            background: #1a0f0a;
            border: none;
            padding: 18px 25px;
            color: #D4AF37;
            font-size: 1em;
            outline: none;
            border-radius: 50px;
        }

        .input-section button {
            background: #D4AF37;
            border: none;
            border-radius: 50px;
            padding: 0 35px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            font-family: 'Pirata One', cursive;
        }

        .stats-panel {
            background: #2c1810;
            border: 3px solid #8B4513;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: #1a0f0a;
            border-radius: 15px;
            border: 2px solid #D4AF37;
        }

        .stat-value {
            color: #00FFFF;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            background: #2c1810;
            padding: 15px;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            background: #1a0f0a;
            color: #D4AF37;
            border: 2px solid #8B4513;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Pirata One', cursive;
            font-size: 1.2em;
        }

        .tab-btn.active {
            background: #D4AF37;
            color: #000;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .category-card {
            background: #2c1810;
            border: 3px solid #8B4513;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #8B4513;
            padding-bottom: 10px;
        }

        .category-title {
            font-size: 1.2em;
            color: #D4AF37;
            font-family: 'Pirata One', cursive;
        }

        .category-count {
            background: #D4AF37;
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
        }

        .channels-list {
            display: none;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .channel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1a0f0a;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .channel-item.blocked {
            opacity: 0.3;
            filter: blur(1px);
            pointer-events: none;
        }

        .play-btn {
            background: #D4AF37;
            border: none;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Pirata One', cursive;
        }

        .parental-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c1810;
            border: 3px solid #D4AF37;
            border-radius: 60px;
            padding: 15px 25px;
            cursor: pointer;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #D4AF37;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #2c1810;
            border: 3px solid #D4AF37;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .player-section {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 400px;
            background: #2c1810;
            border: 3px solid #D4AF37;
            border-radius: 20px;
            padding: 15px;
            z-index: 2500;
            display: none;
        }

        .player-section.active {
            display: block;
        }

        video {
            width: 100%;
            border-radius: 15px;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2c1810;
            border: 3px solid #D4AF37;
            border-radius: 50px;
            padding: 15px 30px;
            color: #D4AF37;
            transition: 0.3s;
            z-index: 4000;
        }

        .toast-message.show {
            transform: translateX(-50%) translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            background: #2c1810;
            border: 3px solid #D4AF37;
            border-radius: 20px;
        }

        .spinner {
            border: 5px solid #8B4513;
            border-top: 5px solid #D4AF37;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .input-section {
                flex-direction: column;
            }
            .player-section {
                width: calc(100% - 40px);
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏴‍☠️ LA PERLA NEGRA</h1>
            <div style="color: #00FFFF;">EL TESORO IPTV MÁS BUSCADO</div>
        </div>

        <div class="input-section">
            <input type="text" id="url" placeholder="🌊 Pega tu lista M3U aquí...">
            <button id="analyzeBtn">⚓ CARGAR</button>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div>📺 TV</div>
                <div class="stat-value" id="liveCount">0</div>
            </div>
            <div class="stat-card">
                <div>🎬 PELIS</div>
                <div class="stat-value" id="vodCount">0</div>
            </div>
            <div class="stat-card">
                <div>📚 SERIES</div>
                <div class="stat-value" id="seriesCount">0</div>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="live">📺 TV</button>
            <button class="tab-btn" data-tab="movies">🎬 PELIS</button>
            <button class="tab-btn" data-tab="series">📚 SERIES</button>
        </div>

        <div id="liveTab" class="tab-content active">
            <div id="liveContent" class="categories-grid"></div>
        </div>
        <div id="moviesTab" class="tab-content">
            <div id="moviesContent" class="categories-grid"></div>
        </div>
        <div id="seriesTab" class="tab-content">
            <div id="seriesContent" class="categories-grid"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #D4AF37;">⚓ Cargando...</p>
        </div>
    </div>

    <div class="parental-float" id="parentalBtn">
        <i class="fas fa-lock"></i>
        <span>CONTROL</span>
    </div>

    <div class="modal" id="parentalModal">
        <div class="modal-content">
            <h2 style="color: #D4AF37; margin-bottom: 20px;">⚓ CONTROL PARENTAL</h2>
            <div id="categoriesList" style="max-height: 300px; overflow-y: auto;"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="tab-btn" id="saveParentalBtn" style="flex:1;">GUARDAR</button>
                <button class="tab-btn" id="cancelParentalBtn" style="flex:1;">CANCELAR</button>
            </div>
        </div>
    </div>

    <div class="player-section" id="playerSection">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="nowPlaying" style="color: #D4AF37;">⚓ Reproduciendo...</span>
            <button class="close-player" id="closePlayerBtn" style="background: none; border: none; color: #D4AF37; font-size: 1.5em; cursor: pointer;">✖</button>
        </div>
        <video id="videoPlayer" controls playsinline></video>
    </div>

    <div class="toast-message" id="toastMessage"></div>

    <script>
        // Variables globales
        let hls = null;
        let liveStreams = [];
        let vodStreams = [];
        let seriesList = [];
        let allCategories = [];
        let blockedCategories = JSON.parse(localStorage.getItem('blockedCategories')) || [];

        const USER_AGENT = 'okhttp/4.11.0';
        const PROXY_URL = 'https://cors-anywhere.herokuapp.com/'; // Proxy CORS

        async function analyzeUrl() {
            const url = document.getElementById('url').value.trim();
            if (!url) {
                showToast('❌ Ingresa una URL', false);
                return;
            }

            showLoading(true);
            
            try {
                // Usar proxy para evitar problemas de CORS y Mixed Content
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
                const finalUrl = proxyUrl + url;
                
                const response = await fetch(finalUrl, {
                    headers: { 
                        'User-Agent': USER_AGENT,
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                const text = await response.text();
                
                if (text.includes('#EXTM3U')) {
                    parseM3U(text);
                } else {
                    showToast('❌ Formato no válido', false);
                }
            } catch (error) {
                console.error(error);
                showToast('❌ Error al cargar: ' + error.message, false);
            } finally {
                showLoading(false);
            }
        }

        function parseM3U(text) {
            liveStreams = [];
            vodStreams = [];
            seriesList = [];
            
            const lines = text.split('\n');
            let currentItem = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    const category = groupMatch ? groupMatch[1] : 'General';
                    
                    const nameMatch = line.match(/,(.+)$/);
                    const name = nameMatch ? nameMatch[1] : 'Canal';
                    
                    currentItem = { name, category };
                } else if (line && !line.startsWith('#') && currentItem) {
                    currentItem.url = line;
                    
                    if (line.includes('.mp4') || line.includes('.mkv') || 
                        currentItem.name.toLowerCase().includes('película')) {
                        vodStreams.push({...currentItem});
                    } else if (currentItem.name.toLowerCase().includes('capítulo') ||
                              currentItem.name.toLowerCase().includes('episodio')) {
                        seriesList.push({...currentItem});
                    } else {
                        liveStreams.push({...currentItem});
                    }
                    
                    currentItem = null;
                }
            }
            
            extractCategories();
            updateCounts();
            displayContent();
            
            showToast(`✅ Cargados: ${liveStreams.length} TV, ${vodStreams.length} Pelis, ${seriesList.length} Series`, true);
        }

        function extractCategories() {
            const cats = new Set();
            [...liveStreams, ...vodStreams, ...seriesList].forEach(item => {
                if (item.category) cats.add(item.category);
            });
            allCategories = Array.from(cats).sort();
        }

        function displayContent() {
            displayLiveContent();
            displayVodContent();
            displaySeriesContent();
        }

        function displayLiveContent() {
            const container = document.getElementById('liveContent');
            if (!liveStreams.length) {
                container.innerHTML = '<p style="text-align: center; color: #666; padding: 40px;">No hay canales</p>';
                return;
            }
            
            const grouped = {};
            liveStreams.forEach(stream => {
                const cat = stream.category || 'General';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(stream);
            });
            
            let html = '';
            for (const [category, items] of Object.entries(grouped)) {
                const categoryId = `live_${category.replace(/\s+/g, '_')}`;
                const isBlocked = blockedCategories.includes(category);
                
                html += `
                    <div class="category-card" onclick="toggleCategory('${categoryId}')">
                        <div class="category-header">
                            <div class="category-title">📺 ${category}</div>
                            <div class="category-count">${items.length}</div>
                        </div>
                        <div class="channels-list" id="${categoryId}">
                `;
                
                items.forEach(item => {
                    html += `
                        <div class="channel-item ${isBlocked ? 'blocked' : ''}">
                            <div class="channel-info">
                                <div class="channel-name">${item.name}</div>
                                <div class="channel-category">${item.category}</div>
                            </div>
                            <div class="channel-actions">
                                <button class="play-btn" onclick="playStream('${item.url}', '${item.name.replace(/'/g, "\\'")}')">▶️</button>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            container.innerHTML = html;
        }

        function displayVodContent() {
            const container = document.getElementById('moviesContent');
            if (!vodStreams.length) {
                container.innerHTML = '<p style="text-align: center; color: #666; padding: 40px;">No hay películas</p>';
                return;
            }
            
            const grouped = {};
            vodStreams.forEach(stream => {
                const cat = stream.category || 'General';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(stream);
            });
            
            let html = '';
            for (const [category, items] of Object.entries(grouped)) {
                const categoryId = `vod_${category.replace(/\s+/g, '_')}`;
                const isBlocked = blockedCategories.includes(category);
                
                html += `
                    <div class="category-card" onclick="toggleCategory('${categoryId}')">
                        <div class="category-header">
                            <div class="category-title">🎬 ${category}</div>
                            <div class="category-count">${items.length}</div>
                        </div>
                        <div class="channels-list" id="${categoryId}">
                `;
                
                items.forEach(item => {
                    html += `
                        <div class="channel-item ${isBlocked ? 'blocked' : ''}">
                            <div class="channel-info">
                                <div class="channel-name">${item.name}</div>
                                <div class="channel-category">${item.category}</div>
                            </div>
                            <div class="channel-actions">
                                <button class="play-btn" onclick="playStream('${item.url}', '${item.name.replace(/'/g, "\\'")}')">▶️</button>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            container.innerHTML = html;
        }

        function displaySeriesContent() {
            const container = document.getElementById('seriesContent');
            if (!seriesList.length) {
                container.innerHTML = '<p style="text-align: center; color: #666; padding: 40px;">No hay series</p>';
                return;
            }
            
            const grouped = {};
            seriesList.forEach(series => {
                const cat = series.category || 'General';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(series);
            });
            
            let html = '';
            for (const [category, items] of Object.entries(grouped)) {
                const categoryId = `series_${category.replace(/\s+/g, '_')}`;
                const isBlocked = blockedCategories.includes(category);
                
                html += `
                    <div class="category-card" onclick="toggleCategory('${categoryId}')">
                        <div class="category-header">
                            <div class="category-title">📚 ${category}</div>
                            <div class="category-count">${items.length}</div>
                        </div>
                        <div class="channels-list" id="${categoryId}">
                `;
                
                items.forEach(item => {
                    html += `
                        <div class="channel-item ${isBlocked ? 'blocked' : ''}">
                            <div class="channel-info">
                                <div class="channel-name">${item.name}</div>
                                <div class="channel-category">${item.category}</div>
                            </div>
                            <div class="channel-actions">
                                <button class="play-btn" onclick="playStream('${item.url}', '${item.name.replace(/'/g, "\\'")}')">▶️</button>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            container.innerHTML = html;
        }

        function playStream(url, title) {
            if (!url) return;
            
            const player = document.getElementById('playerSection');
            const video = document.getElementById('videoPlayer');
            
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            video.pause();
            video.removeAttribute('src');
            video.load();
            
            // También usar proxy para los streams si son HTTP
            let streamUrl = url;
            if (url.startsWith('http:')) {
                streamUrl = PROXY_URL + url;
            }
            
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(e => console.warn('Autoplay error', e));
                    });
                } else {
                    video.src = streamUrl;
                }
            } else {
                video.src = streamUrl;
            }
            
            video.load();
            video.play().catch(e => console.warn('Autoplay error', e));
            
            player.classList.add('active');
            document.getElementById('nowPlaying').textContent = `⚓ ${title || 'Reproduciendo'}`;
        }

        function closePlayer() {
            const player = document.getElementById('playerSection');
            const video = document.getElementById('videoPlayer');
            
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            player.classList.remove('active');
            video.pause();
            video.removeAttribute('src');
            video.load();
        }

        function toggleCategory(id) {
            const element = document.getElementById(id);
            if (element) {
                element.style.display = element.style.display === 'block' ? 'none' : 'block';
            }
        }

        function updateCounts() {
            document.getElementById('liveCount').textContent = liveStreams.length;
            document.getElementById('vodCount').textContent = vodStreams.length;
            document.getElementById('seriesCount').textContent = seriesList.length;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function openParentalModal() {
            const modal = document.getElementById('parentalModal');
            const list = document.getElementById('categoriesList');
            
            list.innerHTML = allCategories.map(cat => `
                <label style="display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #8B4513;">
                    <input type="checkbox" value="${cat}" ${blockedCategories.includes(cat) ? 'checked' : ''} style="margin-right: 10px;">
                    <span style="color: #D4AF37;">${cat}</span>
                </label>
            `).join('');
            
            modal.classList.add('active');
        }

        function saveParentalSettings() {
            const checkboxes = document.querySelectorAll('#categoriesList input:checked');
            blockedCategories = Array.from(checkboxes).map(cb => cb.value);
            localStorage.setItem('blockedCategories', JSON.stringify(blockedCategories));
            
            displayContent();
            closeParentalModal();
            showToast('✅ Guardado', true);
        }

        function closeParentalModal() {
            document.getElementById('parentalModal').classList.remove('active');
        }

        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = 'toast-message show' + (isSuccess ? '' : ' error');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`${tabName}Tab`).classList.add('active');
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('analyzeBtn').addEventListener('click', analyzeUrl);
            document.getElementById('closePlayerBtn').addEventListener('click', closePlayer);
            document.getElementById('parentalBtn').addEventListener('click', openParentalModal);
            document.getElementById('saveParentalBtn').addEventListener('click', saveParentalSettings);
            document.getElementById('cancelParentalBtn').addEventListener('click', closeParentalModal);
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    switchTab(e.target.dataset.tab);
                });
            });
            
            document.getElementById('url').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') analyzeUrl();
            });
        });
    </script>
</body>
</html>
