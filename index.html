<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏴‍☠️ LA PERLA NEGRA - IPTV PROXY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        /* HEADER */
        .header {
            background: #000;
            border-bottom: 2px solid #D4AF37;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            color: #D4AF37;
            font-size: 1.5em;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: #1a1a1a;
            border: 1px solid #D4AF37;
            border-radius: 40px;
            padding: 10px 18px;
            color: #D4AF37;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: #D4AF37;
            color: #000;
        }

        .icon-btn.active {
            background: #D4AF37;
            color: #000;
            border-color: #00ff00;
        }

        .icon-btn.active span:first-child {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        /* INPUT M3U */
        .url-section {
            margin: 20px 0;
        }

        .url-box {
            display: flex;
            gap: 10px;
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 60px;
            padding: 5px;
            overflow: hidden;
        }

        .url-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 25px;
            color: white;
            font-size: 1em;
            outline: none;
        }

        .url-box input::placeholder {
            color: #666;
        }

        .url-box button {
            background: #D4AF37;
            border: none;
            border-radius: 50px;
            padding: 0 35px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .url-box button:hover {
            background: #FFD700;
        }

        /* ESTADÍSTICAS */
        .stats {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .stat-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
        }

        .stat-number {
            color: #D4AF37;
            font-weight: bold;
            font-size: 1.3em;
        }

        /* PESTAÑAS */
        .tabs {
            display: flex;
            gap: 5px;
            margin: 25px 0 15px;
            border-bottom: 1px solid #333;
        }

        .tab {
            padding: 12px 25px;
            background: transparent;
            border: none;
            color: #666;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #D4AF37;
            border-bottom-color: #D4AF37;
        }

        .tab-count {
            background: #333;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        /* GRID DE CONTENIDO */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px 5px;
        }

        .content-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .content-card:hover {
            border-color: #D4AF37;
            transform: translateY(-3px);
        }

        .content-card.blocked {
            opacity: 0.4;
            filter: blur(1px);
            pointer-events: none;
        }

        .content-card.blocked::after {
            content: '🔒';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2em;
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-category {
            color: #D4AF37;
            font-size: 0.8em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-type {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #D4AF37;
            color: #000;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: bold;
        }

        /* MODAL PARENTAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-header {
            background: #000;
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .modal-header h3 {
            color: #D4AF37;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-body {
            padding: 20px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .category-row {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }

        .category-row:hover {
            background: #000;
        }

        .category-name {
            flex: 1;
        }

        .category-check {
            width: 24px;
            height: 24px;
            border: 2px solid #D4AF37;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #D4AF37;
            font-weight: bold;
        }

        .category-row.selected .category-check {
            background: #D4AF37;
            color: #000;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            background: #D4AF37;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-btn.dark {
            background: #333;
            color: #D4AF37;
        }

        /* PIN MODAL */
        .pin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .pin-modal.active {
            display: flex;
        }

        .pin-content {
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 30px;
            width: 300px;
            text-align: center;
        }

        .pin-display {
            font-size: 2.5em;
            letter-spacing: 10px;
            margin: 20px 0;
            color: #D4AF37;
        }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .pin-key {
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
        }

        .pin-key:hover {
            border-color: #D4AF37;
        }

        /* REPRODUCTOR */
        .player-section {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 2px solid #D4AF37;
            display: none;
            z-index: 500;
        }

        .player-section.active {
            display: block;
        }

        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #1a1a1a;
        }

        .player-title {
            color: #D4AF37;
            font-size: 0.9em;
        }

        .close-player {
            background: none;
            border: none;
            color: #D4AF37;
            font-size: 1.5em;
            cursor: pointer;
        }

        video {
            width: 100%;
            max-height: 300px;
            background: #000;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 30px;
            padding: 12px 25px;
            color: #D4AF37;
            transition: 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-color: #ff4444;
            background: #330000;
        }

        @media (max-width: 768px) {
            .url-box {
                flex-direction: column;
                border-radius: 20px;
            }
            
            .url-box button {
                padding: 15px;
                width: 100%;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
            
            .tab {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>🏴‍☠️ LA PERLA NEGRA</h1>
        </div>
        <div class="header-buttons">
            <div class="icon-btn" id="warpBtn" onclick="perla.toggleWorker()">
                <span>🌐</span> WARP
            </div>
            <div class="icon-btn" id="parentalBtn" onclick="perla.openParentalModal()">
                <span>🔒</span> CONTROL
            </div>
        </div>
    </div>

    <div class="container">
        <!-- INPUT M3U -->
        <div class="url-section">
            <div class="url-box">
                <input type="text" id="m3uUrl" placeholder="Pega tu lista M3U aquí... (ej: http://ejemplo.com/list.m3u)">
                <button id="loadM3UBtn" onclick="perla.loadM3U()">⚓ CARGAR</button>
            </div>
        </div>

        <!-- Estadísticas -->
        <div class="stats">
            <div class="stat-item">
                <span>📺 TV</span>
                <span class="stat-number" id="liveCount">0</span>
            </div>
            <div class="stat-item">
                <span>🎬 PELIS</span>
                <span class="stat-number" id="movieCount">0</span>
            </div>
            <div class="stat-item">
                <span>📚 SERIES</span>
                <span class="stat-number" id="seriesCount">0</span>
            </div>
        </div>

        <!-- Pestañas -->
        <div class="tabs">
            <div class="tab active" data-tab="live" onclick="perla.switchTab('live')">📺 TV <span class="tab-count" id="liveTabCount">0</span></div>
            <div class="tab" data-tab="movies" onclick="perla.switchTab('movies')">🎬 PELÍCULAS <span class="tab-count" id="moviesTabCount">0</span></div>
            <div class="tab" data-tab="series" onclick="perla.switchTab('series')">📚 SERIES <span class="tab-count" id="seriesTabCount">0</span></div>
        </div>

        <!-- Contenido -->
        <div id="liveContent" class="content-grid"></div>
        <div id="moviesContent" class="content-grid" style="display: none;"></div>
        <div id="seriesContent" class="content-grid" style="display: none;"></div>
    </div>

    <!-- MODAL PARENTAL -->
    <div class="modal" id="parentalModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚓ CONTROL PARENTAL</h3>
                <p style="color: #666; font-size: 0.9em; margin-top: 5px;">Selecciona categorías a bloquear</p>
            </div>
            <div class="modal-body" id="categoriesList"></div>
            <div class="modal-footer">
                <button class="modal-btn dark" onclick="document.getElementById('parentalModal').classList.remove('active')">CANCELAR</button>
                <button class="modal-btn" onclick="perla.saveParentalSettings()">GUARDAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL PIN -->
    <div class="pin-modal" id="pinModal">
        <div class="pin-content">
            <h3 style="color: #D4AF37;">🔒 INTRODUCE PIN</h3>
            <div class="pin-display" id="pinDisplay">****</div>
            <div class="pin-grid" id="pinGrid"></div>
            <button class="modal-btn dark" onclick="document.getElementById('pinModal').classList.remove('active')">CANCELAR</button>
        </div>
    </div>

    <!-- REPRODUCTOR -->
    <div class="player-section" id="playerSection">
        <div class="player-header">
            <span class="player-title" id="playerTitle">⚓ Navegando...</span>
            <button class="close-player" onclick="perla.closePlayer()">✖</button>
        </div>
        <video id="videoPlayer" controls playsinline></video>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== LA PERLA NEGRA CON WORKER CLOUDFLARE ====================
        const USER_AGENT = 'okhttp/4.11.0';

        class PerlaNegra {
            constructor() {
                // Configuración del Worker (¡CAMBIÁ ESTO POR TU URL!)
                this.WORKER_URL = 'https://quiet-lake-ca31perlanegraproxy.rickgar600.workers.dev';
                this.useWorker = localStorage.getItem('perlaWorker') !== 'false'; // Activado por defecto
                
                // Estado
                this.pin = localStorage.getItem('perlaPin') || null;
                this.blockedCategories = JSON.parse(localStorage.getItem('perlaBlocked')) || [];
                
                // Datos M3U
                this.liveChannels = [];
                this.movies = [];
                this.series = [];
                this.allCategories = [];
                
                this.init();
            }

            init() {
                this.updateWarpUI();
                this.loadSampleData(); // Para probar
            }

            // ==================== WORKER CLOUDFLARE ====================
            toggleWorker() {
                this.useWorker = !this.useWorker;
                localStorage.setItem('perlaWorker', this.useWorker);
                this.updateWarpUI();
                this.toast(this.useWorker ? '🌐 WARP activado (vía Cloudflare)' : '🌐 WARP desactivado');
            }

            updateWarpUI() {
                const btn = document.getElementById('warpBtn');
                if (btn) {
                    btn.innerHTML = this.useWorker ? 
                        '<span>🌐</span> WARP ON' : 
                        '<span>🌐</span> WARP';
                    btn.classList.toggle('active', this.useWorker);
                }
            }

            // ==================== REPRODUCCIÓN CON WORKER ====================
            async playItem(url, name) {
                if (!url || url === '#') {
                    this.toast('❌ URL inválida', 'error');
                    return;
                }
                
                let streamUrl = url;
                
                // Si el worker está activado, pasar por proxy
                if (this.useWorker && this.WORKER_URL) {
                    streamUrl = `${this.WORKER_URL}/?url=${encodeURIComponent(url)}`;
                    console.log('🌐 Usando worker:', streamUrl);
                }
                
                const video = document.getElementById('videoPlayer');
                const player = document.getElementById('playerSection');
                const title = document.getElementById('playerTitle');
                
                // Detener reproducción anterior
                video.pause();
                video.removeAttribute('src');
                video.load();
                
                // Cargar nueva URL
                video.src = streamUrl;
                video.load();
                
                // Mostrar reproductor
                player.classList.add('active');
                title.textContent = `⚓ ${name || 'Reproduciendo'} (${this.useWorker ? 'WARP' : 'directo'})`;
                
                try {
                    await video.play();
                    this.toast(`✅ Reproduciendo: ${name}`);
                } catch (error) {
                    console.error('Error reproduciendo:', error);
                    
                    // Si falla con worker, intentar sin él automáticamente
                    if (this.useWorker) {
                        this.toast('⚠️ Falló con WARP, intentando directo...', 'error');
                        this.useWorker = false;
                        this.updateWarpUI();
                        setTimeout(() => this.playItem(url, name), 1000);
                    } else {
                        this.toast('❌ Error al reproducir. Probá activando WARP.', 'error');
                    }
                }
            }

            closePlayer() {
                const player = document.getElementById('playerSection');
                const video = document.getElementById('videoPlayer');
                
                player.classList.remove('active');
                video.pause();
                video.removeAttribute('src');
                video.load();
            }

            // ==================== M3U PARSER ====================
            async loadM3U() {
                const url = document.getElementById('m3uUrl').value.trim();
                if (!url) {
                    this.toast('❌ Pega una URL M3U');
                    return;
                }

                this.toast('⚓ Cargando lista...');
                
                try {
                    const response = await fetch(url, {
                        headers: { 'User-Agent': USER_AGENT }
                    });
                    const m3uText = await response.text();
                    
                    this.parseM3U(m3uText);
                    this.extractCategories();
                    this.renderContent();
                    this.updateCounts();
                    this.toast('✅ Lista cargada correctamente');
                    
                } catch (error) {
                    console.error(error);
                    this.toast('❌ Error al cargar la lista', 'error');
                }
            }

            parseM3U(text) {
                // Reset
                this.liveChannels = [];
                this.movies = [];
                this.series = [];
                
                const lines = text.split('\n');
                let currentInfo = null;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        // Extraer información
                        const match = line.match(/#EXTINF:-?1.*?tvg-id="(.*?)".*?tvg-name="(.*?)".*?tvg-logo="(.*?)".*?group-title="(.*?)".*?,(.*)/);
                        
                        if (match) {
                            currentInfo = {
                                id: match[1],
                                name: match[5] || 'Sin nombre',
                                logo: match[3] || '',
                                category: match[4] || 'General',
                                tvgName: match[2] || ''
                            };
                        } else {
                            // Formato simple
                            const simpleMatch = line.match(/#EXTINF:-?\d*.*?,(.*)/);
                            if (simpleMatch) {
                                currentInfo = {
                                    name: simpleMatch[1] || 'Canal',
                                    category: 'General',
                                    logo: ''
                                };
                            }
                        }
                    } else if (line && !line.startsWith('#') && currentInfo) {
                        // Es la URL
                        currentInfo.url = line;
                        
                        // Clasificar por extensión o nombre
                        const urlLower = line.toLowerCase();
                        const nameLower = currentInfo.name.toLowerCase();
                        
                        if (urlLower.includes('.mp4') || urlLower.includes('.mkv') || 
                            nameLower.includes('película') || nameLower.includes('movie') ||
                            nameLower.includes('film')) {
                            this.movies.push({...currentInfo, type: 'movie'});
                        } 
                        else if (nameLower.includes('capítulo') || nameLower.includes('episodio') || 
                                 nameLower.includes('serie') || nameLower.includes('temporada')) {
                            this.series.push({...currentInfo, type: 'series'});
                        }
                        else {
                            this.liveChannels.push({...currentInfo, type: 'live'});
                        }
                        
                        currentInfo = null;
                    }
                }
                
                console.log(`Cargados: ${this.liveChannels.length} canales, ${this.movies.length} pelis, ${this.series.length} series`);
            }

            extractCategories() {
                const cats = new Set();
                
                [...this.liveChannels, ...this.movies, ...this.series].forEach(item => {
                    if (item.category) cats.add(item.category);
                });
                
                this.allCategories = Array.from(cats).sort();
            }

            // ==================== RENDERIZADO ====================
            renderContent() {
                this.renderLive();
                this.renderMovies();
                this.renderSeries();
            }

            renderLive() {
                const container = document.getElementById('liveContent');
                container.innerHTML = this.liveChannels.map(ch => {
                    const blocked = this.isBlocked(ch.category);
                    return `
                        <div class="content-card ${blocked ? 'blocked' : ''}" onclick="perla.playItem('${ch.url}', '${ch.name.replace(/'/g, "\\'")}')">
                            <div class="card-type">TV</div>
                            <div class="card-title">${ch.name}</div>
                            <div class="card-category">
                                <span>📺</span> ${ch.category || 'General'}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            renderMovies() {
                const container = document.getElementById('moviesContent');
                container.innerHTML = this.movies.map(movie => {
                    const blocked = this.isBlocked(movie.category);
                    return `
                        <div class="content-card ${blocked ? 'blocked' : ''}" onclick="perla.playItem('${movie.url}', '${movie.name.replace(/'/g, "\\'")}')">
                            <div class="card-type">🎬</div>
                            <div class="card-title">${movie.name}</div>
                            <div class="card-category">
                                <span>🎬</span> ${movie.category || 'General'}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            renderSeries() {
                const container = document.getElementById('seriesContent');
                container.innerHTML = this.series.map(serie => {
                    const blocked = this.isBlocked(serie.category);
                    return `
                        <div class="content-card ${blocked ? 'blocked' : ''}" onclick="perla.playItem('${serie.url}', '${serie.name.replace(/'/g, "\\'")}')">
                            <div class="card-type">📚</div>
                            <div class="card-title">${serie.name}</div>
                            <div class="card-category">
                                <span>📚</span> ${serie.category || 'General'}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            isBlocked(category) {
                if (!category) return false;
                return this.blockedCategories.some(cat => 
                    category.toLowerCase().includes(cat.toLowerCase())
                );
            }

            updateCounts() {
                document.getElementById('liveCount').textContent = this.liveChannels.length;
                document.getElementById('movieCount').textContent = this.movies.length;
                document.getElementById('seriesCount').textContent = this.series.length;
                
                document.getElementById('liveTabCount').textContent = this.liveChannels.length;
                document.getElementById('moviesTabCount').textContent = this.movies.length;
                document.getElementById('seriesTabCount').textContent = this.series.length;
            }

            switchTab(tab) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content-grid').forEach(c => c.style.display = 'none');
                
                document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
                document.getElementById(`${tab}Content`).style.display = 'grid';
            }

            // ==================== CONTROL PARENTAL ====================
            openParentalModal() {
                // Si hay PIN, pedirlo primero
                if (this.pin) {
                    this.showPinModal(() => this.showCategoriesModal());
                } else {
                    this.showCategoriesModal();
                }
            }

            showCategoriesModal() {
                const modal = document.getElementById('parentalModal');
                const list = document.getElementById('categoriesList');
                
                // Mostrar categorías
                list.innerHTML = this.allCategories.map(cat => `
                    <div class="category-row ${this.blockedCategories.includes(cat) ? 'selected' : ''}" data-category="${cat}">
                        <span class="category-name">${cat}</span>
                        <span class="category-check">${this.blockedCategories.includes(cat) ? '✓' : ''}</span>
                    </div>
                `).join('');
                
                // Añadir eventos
                document.querySelectorAll('.category-row').forEach(row => {
                    row.addEventListener('click', () => {
                        row.classList.toggle('selected');
                        const check = row.querySelector('.category-check');
                        check.textContent = row.classList.contains('selected') ? '✓' : '';
                    });
                });
                
                modal.classList.add('active');
            }

            saveParentalSettings() {
                const modal = document.getElementById('parentalModal');
                const rows = document.querySelectorAll('.category-row');
                
                this.blockedCategories = [];
                rows.forEach(row => {
                    if (row.classList.contains('selected')) {
                        this.blockedCategories.push(row.dataset.category);
                    }
                });
                
                localStorage.setItem('perlaBlocked', JSON.stringify(this.blockedCategories));
                this.renderContent();
                modal.classList.remove('active');
                this.toast('✅ Configuración guardada');
            }

            // ==================== PIN MODAL ====================
            showPinModal(onSuccess) {
                const modal = document.getElementById('pinModal');
                const display = document.getElementById('pinDisplay');
                const grid = document.getElementById('pinGrid');
                let pin = '';
                
                modal.classList.add('active');
                display.textContent = '****';
                
                grid.innerHTML = '';
                for (let i = 1; i <= 9; i++) {
                    const btn = document.createElement('div');
                    btn.className = 'pin-key';
                    btn.textContent = i;
                    btn.onclick = () => {
                        if (pin.length < 4) {
                            pin += i;
                            display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                        }
                    };
                    grid.appendChild(btn);
                }
                
                const zeroBtn = document.createElement('div');
                zeroBtn.className = 'pin-key';
                zeroBtn.textContent = '0';
                zeroBtn.onclick = () => {
                    if (pin.length < 4) {
                        pin += '0';
                        display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                    }
                };
                grid.appendChild(zeroBtn);
                
                const delBtn = document.createElement('div');
                delBtn.className = 'pin-key';
                delBtn.innerHTML = '⌫';
                delBtn.onclick = () => {
                    pin = pin.slice(0, -1);
                    display.textContent = '•'.repeat(pin.length) + '*'.repeat(4 - pin.length);
                };
                grid.appendChild(delBtn);
                
                const okBtn = document.createElement('div');
                okBtn.className = 'pin-key';
                okBtn.innerHTML = '✓';
                okBtn.onclick = () => {
                    if (pin === this.pin) {
                        modal.classList.remove('active');
                        onSuccess();
                    } else {
                        this.toast('❌ PIN incorrecto', 'error');
                        pin = '';
                        display.textContent = '****';
                    }
                };
                grid.appendChild(okBtn);
            }

            setPin() {
                const newPin = prompt('🔐 Introduce nuevo PIN de 4 dígitos:');
                if (newPin && newPin.length === 4 && /^\d+$/.test(newPin)) {
                    this.pin = newPin;
                    localStorage.setItem('perlaPin', newPin);
                    this.toast('✅ PIN guardado');
                } else {
                    this.toast('❌ Debe tener 4 números', 'error');
                }
            }

            clearPin() {
                if (confirm('¿Eliminar PIN?')) {
                    this.pin = null;
                    localStorage.removeItem('perlaPin');
                    this.toast('🔓 PIN eliminado');
                }
            }

            // ==================== UTILIDADES ====================
            toast(msg, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = 'toast show';
                if (type === 'error') toast.style.borderColor = '#ff4444';
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            loadSampleData() {
                // Datos de ejemplo para probar
                this.liveChannels = [
                    { name: 'Canal 24h', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', category: 'Noticias' },
                    { name: 'Deportes TV', url: 'https://test-streams.mux.dev/bbb_sunflower_1080p_30fps_normal.mp4', category: 'Deportes' },
                    { name: 'Cine Español', url: '#', category: 'Cine' },
                    { name: 'Canal +18', url: '#', category: '+18' },
                    { name: 'Infantil', url: '#', category: 'Infantil' }
                ];
                
                this.movies = [
                    { name: 'El Padrino', url: '#', category: 'Cine' },
                    { name: 'Pelicula +18', url: '#', category: '+18' },
                    { name: 'Comedia', url: '#', category: 'Comedia' }
                ];
                
                this.series = [
                    { name: 'Serie Infantil', url: '#', category: 'Infantil' },
                    { name: 'Serie Adultos', url: '#', category: '+18' }
                ];
                
                this.allCategories = ['Noticias', 'Deportes', 'Cine', '+18', 'Infantil', 'Comedia'];
                this.renderContent();
                this.updateCounts();
            }
        }

        // Inicializar
        const perla = new PerlaNegra();
        window.perla = perla;

        // Evento para el input (Enter)
        document.getElementById('m3uUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') perla.loadM3U();
        });
    </script>
</body>
