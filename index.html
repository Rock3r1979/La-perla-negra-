<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8B4513">
    <title>🏴‍☠️ LA PERLA NEGRA - IPTV Pirata</title>
    
    <!-- Fonts y estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0f0a;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><path d="M20,20 L80,20 L80,80 L20,80 Z" fill="none" stroke="%238B4513" stroke-width="0.5" opacity="0.3"/><circle cx="50" cy="50" r="5" fill="%23D4AF37" opacity="0.2"/></svg>');
            color: #fff;
            min-height: 100vh;
            font-family: 'Cinzel', serif;
            position: relative;
        }

        /* Efecto pergamino antiguo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><path d="M10,10 Q30,5 50,10 Q70,15 90,10 L90,90 Q70,85 50,90 Q30,95 10,90 Z" fill="none" stroke="%23D4AF37" stroke-width="0.3" opacity="0.1"/></svg>');
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header estilo mapa del tesoro */
        .header {
            background: #2c1810;
            border: 3px solid #8B4513;
            border-radius: 30px 30px 10px 10px;
            padding: 30px;
            margin-bottom: 40px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 50px rgba(139,69,19,0.3);
            background-image: linear-gradient(45deg, #3a241a 0%, #2c1810 100%);
        }

        .header::before, .header::after {
            content: '⚓';
            position: absolute;
            font-size: 2em;
            color: #D4AF37;
            opacity: 0.3;
        }

        .header::before {
            top: 10px;
            left: 20px;
            transform: rotate(-15deg);
        }

        .header::after {
            bottom: 10px;
            right: 20px;
            transform: rotate(15deg);
        }

        .logo {
            font-family: 'Pirata One', cursive;
            font-size: 4em;
            text-align: center;
            color: #D4AF37;
            text-shadow: 
                3px 3px 0 #8B4513,
                6px 6px 0 #000,
                0 0 20px #FFD700;
            letter-spacing: 4px;
            transform: skew(-5deg);
            margin-bottom: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .logo i {
            font-size: 1.5em;
            filter: drop-shadow(0 0 10px gold);
        }

        .subtitle {
            text-align: center;
            color: #cdb38c;
            font-size: 1.2em;
            letter-spacing: 4px;
            border-top: 2px solid #8B4513;
            border-bottom: 2px solid #8B4513;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            background: rgba(0,0,0,0.3);
        }

        /* Panel de control pirata */
        .pirate-panel {
            background: #2c1810;
            border: 3px solid #8B4513;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        .panel-title {
            font-family: 'Pirata One', cursive;
            font-size: 2.5em;
            color: #D4AF37;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #8B4513;
            padding-bottom: 15px;
        }

        .panel-title i {
            font-size: 1.5em;
            color: #cdb38c;
        }

        /* Candado parental */
        .parental-lock {
            background: #1a0f0a;
            border: 2px solid #D4AF37;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .lock-header {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #D4AF37;
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        .lock-header i {
            font-size: 2em;
        }

        .pin-container {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pin-input {
            background: #2c1810;
            border: 2px solid #8B4513;
            border-radius: 10px;
            padding: 15px 20px;
            color: #D4AF37;
            font-size: 1.5em;
            letter-spacing: 8px;
            text-align: center;
            width: 200px;
            font-weight: bold;
            font-family: 'Cinzel', serif;
        }

        .pirate-btn {
            background: linear-gradient(135deg, #8B4513, #5d3a1a);
            border: 2px solid #D4AF37;
            border-radius: 30px;
            padding: 15px 30px;
            color: #D4AF37;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px gold;
        }

        .pirate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            border-color: #FFD700;
        }

        .pirate-btn.danger {
            background: linear-gradient(135deg, #6b0f0f, #8b0000);
        }

        .pirate-btn.success {
            background: linear-gradient(135deg, #2d5a27, #1e3b1a);
        }

        /* Categorías con estilo cofre */
        .categories-chest {
            background: #1a0f0a;
            border: 2px solid #8B4513;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .chest-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #D4AF37;
            font-size: 1.5em;
            margin-bottom: 20px;
            font-family: 'Pirata One', cursive;
        }

        .category-map {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }

        .category-tag {
            background: #2c1810;
            border: 1px solid #8B4513;
            border-radius: 30px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            color: #cdb38c;
            font-size: 1em;
            position: relative;
        }

        .category-tag:hover {
            border-color: #D4AF37;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
        }

        .category-tag.locked {
            background: #4a2c1f;
            border-color: #8b0000;
            color: #ff6b6b;
            position: relative;
            overflow: hidden;
        }

        .category-tag.locked::before {
            content: '⚓';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5em;
            opacity: 0.2;
        }

        .category-tag i {
            font-size: 1.2em;
        }

        .lock-indicator {
            margin-left: 10px;
            color: #D4AF37;
        }

        /* Brújula de actividad */
        .compass-log {
            background: #2c1810;
            border: 3px solid #8B4513;
            border-radius: 50% 50% 20px 20px;
            padding: 25px;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        .compass-log::before {
            content: '🧭';
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 3em;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid #8B4513;
            font-size: 0.95em;
        }

        .log-time {
            color: #D4AF37;
            font-weight: bold;
            min-width: 80px;
            font-family: 'Cinzel', serif;
        }

        .log-action {
            background: rgba(139, 69, 19, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #8B4513;
        }

        .log-action.failed {
            background: rgba(139, 0, 0, 0.3);
            border-color: #8b0000;
            color: #ff6b6b;
        }

        /* Barco de búsqueda */
        .ship-search {
            background: #2c1810;
            border: 3px solid #8B4513;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .ship-search input {
            flex: 1;
            min-width: 250px;
            background: #1a0f0a;
            border: 2px solid #8B4513;
            border-radius: 50px;
            padding: 18px 25px;
            color: #D4AF37;
            font-size: 1.1em;
            font-family: 'Cinzel', serif;
        }

        .ship-search input::placeholder {
            color: #6b4f3a;
            font-style: italic;
        }

        /* Tesoro (grid de contenido) */
        .treasure-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }

        .treasure-card {
            background: #2c1810;
            border: 2px solid #8B4513;
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .treasure-card::before {
            content: '⚓';
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 5em;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .treasure-card:hover {
            transform: translateY(-10px) rotate(1deg);
            border-color: #D4AF37;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
        }

        .treasure-card.looted {
            opacity: 0.7;
            filter: blur(3px);
            pointer-events: none;
            position: relative;
        }

        .treasure-card.looted::after {
            content: '🔒 BOTÍN BLOQUEADO';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #8b0000;
            color: #D4AF37;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 10;
            white-space: nowrap;
            border: 2px solid #D4AF37;
            font-size: 0.9em;
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #8B4513;
            color: #D4AF37;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.8em;
            font-weight: bold;
            border: 1px solid #D4AF37;
            z-index: 2;
        }

        .treasure-icon {
            font-size: 3em;
            color: #D4AF37;
            margin-bottom: 20px;
            text-align: center;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.3));
        }

        .treasure-name {
            font-family: 'Pirata One', cursive;
            font-size: 1.5em;
            color: #cdb38c;
            margin-bottom: 10px;
            text-align: center;
        }

        .treasure-category {
            color: #8B4513;
            font-size: 0.9em;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .treasure-category i {
            color: #D4AF37;
        }

        .treasure-btn {
            background: linear-gradient(135deg, #8B4513, #5d3a1a);
            border: 2px solid #D4AF37;
            border-radius: 30px;
            padding: 12px;
            color: #D4AF37;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .treasure-btn:hover:not(:disabled) {
            background: #D4AF37;
            color: #2c1810;
        }

        .treasure-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal del capitán */
        .captain-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .captain-modal.active {
            display: flex;
        }

        .modal-content {
            background: #2c1810;
            border: 4px solid #D4AF37;
            border-radius: 30px;
            padding: 50px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.3);
            animation: shipRock 0.3s ease;
        }

        @keyframes shipRock {
            0% { transform: rotate(-2deg) scale(0.8); opacity: 0; }
            50% { transform: rotate(2deg) scale(1.02); }
            100% { transform: rotate(0) scale(1); opacity: 1; }
        }

        .modal-content::before {
            content: '🏴‍☠️';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4em;
            filter: drop-shadow(0 10px 10px black);
        }

        .modal-title {
            font-family: 'Pirata One', cursive;
            font-size: 2.5em;
            color: #D4AF37;
            margin: 30px 0 20px;
        }

        .pin-wheel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .pin-number {
            background: #1a0f0a;
            border: 2px solid #8B4513;
            border-radius: 20px;
            padding: 20px;
            font-size: 2em;
            color: #D4AF37;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cinzel', serif;
            font-weight: bold;
        }

        .pin-number:hover {
            background: #8B4513;
            border-color: #D4AF37;
            transform: scale(1.1);
        }

        .pin-number:active {
            transform: scale(0.9);
        }

        .pin-display {
            background: #1a0f0a;
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 20px;
            font-size: 2.5em;
            letter-spacing: 15px;
            margin: 20px 0;
            color: #D4AF37;
            font-weight: bold;
        }

        /* Brújula de carga */
        .compass-loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .compass-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid #8B4513;
            border-top: 5px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .compass-spinner::after {
            content: '🧭';
            position: absolute;
            font-size: 2em;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mensajes del capitán */
        .captain-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2c1810;
            border: 3px solid #D4AF37;
            border-radius: 50px;
            padding: 20px 40px;
            color: #D4AF37;
            font-weight: bold;
            z-index: 10001;
            transition: transform 0.3s ease;
            text-align: center;
            min-width: 300px;
            font-size: 1.1em;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .captain-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .captain-toast.error {
            border-color: #8b0000;
            background: #4a1f1f;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5em;
                flex-direction: column;
                gap: 10px;
            }
            
            .pin-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .pin-input {
                width: 100%;
            }
            
            .ship-search {
                flex-direction: column;
            }
            
            .ship-search input {
                width: 100%;
            }
            
            .category-map {
                justify-content: center;
            }
            
            .treasure-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 30px 20px;
            }
            
            .pin-number {
                padding: 15px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header con nombre del barco -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-skull"></i>
                <span>LA PERLA NEGRA</span>
                <i class="fas fa-anchor"></i>
            </div>
            <div class="subtitle">
                <i class="fas fa-map"></i> EL TESORO IPTV MÁS BUSCADO DE LOS SIETE MARES <i class="fas fa-map"></i>
            </div>
        </div>

        <!-- Panel del capitán (control parental) -->
        <div class="pirate-panel">
            <div class="panel-title">
                <i class="fas fa-crown"></i>
                CAMAROTE DEL CAPITÁN
                <i class="fas fa-crown"></i>
